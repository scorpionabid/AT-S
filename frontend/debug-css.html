<!DOCTYPE html>
<html>
<head>
  <title>CSS Debug Test</title>
  <style>
    /* Import design tokens */
    @import './src/styles/tokens/design-tokens.css';
    
    .test-sidebar {
      background: red;
      width: 200px;
      height: 100px;
      position: fixed;
      z-index: var(--z-sidebar, 1000);
      top: 0;
      left: 0;
    }
    
    .test-header {
      background: blue;
      width: 300px;
      height: 50px;
      position: fixed;
      z-index: var(--z-page-header, 500);
      top: 20px;
      left: 50px;
    }
  </style>
</head>
<body>
  <div class="test-sidebar">Sidebar (should be ON TOP)</div>
  <div class="test-header">Page Header (should be BELOW)</div>
  
  <script>
    console.log('CSS Variables Test:');
    const root = document.documentElement;
    const computed = getComputedStyle(root);
    
    console.log('--z-sidebar:', computed.getPropertyValue('--z-sidebar'));
    console.log('--z-page-header:', computed.getPropertyValue('--z-page-header'));
    
    const sidebar = document.querySelector('.test-sidebar');
    const header = document.querySelector('.test-header');
    
    console.log('Sidebar computed z-index:', getComputedStyle(sidebar).zIndex);
    console.log('Header computed z-index:', getComputedStyle(header).zIndex);
  </script>
</body>
</html>
